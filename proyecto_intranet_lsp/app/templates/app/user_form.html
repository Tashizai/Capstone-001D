{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2>{% if usuario %}Editar Usuario{% else %}Crear Usuario{% endif %}</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">{% if usuario %}Actualizar{% else %}Crear{% endif %}</button>
        <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
