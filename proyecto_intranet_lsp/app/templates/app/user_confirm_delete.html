{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2>¿Estás seguro de eliminar a {{ usuario.nombre }} {{ usuario.apellido }}?</h2>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
